<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Celebrate!</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Small celebratory styling (keeps using the project's font import) */
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background: linear-gradient(135deg,#ffefba,#ffffff); }
    .message { text-align:center; font-family: 'Sacramento', cursive; font-size:3rem; color:#333; }
    .sub { font-size:1rem; color:#444; margin-top:0.5rem; }
    a.back { display:inline-block; margin-top:1.2rem; color:#fff; background:#7b61ff; padding:0.5rem 1rem; border-radius:6px; text-decoration:none; }
  </style>
</head>
<body>
  <div class="message">
    <h1>Happy Birthday!</h1>
    <p class="sub">Make a wish and have fun 🎉</p>
    <a class="back" href="birthday.html">Back</a>
  </div>
</body>
</html>
